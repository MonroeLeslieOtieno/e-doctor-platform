        }

    </select>

        <p><strong>Age:</strong> <span id="age"></span></p>
        <p><strong>Previous Condition:</strong> <span id="condition"></span></p>

        }

<script>
function showStudentInfo(){
    const select = document.getElementById('studentList');
    const option = select.options[select.selectedIndex];

    if(option.value === ""){
        document.getElementById('studentReview').style.display = 'none';
        return;
    }

    document.getElementById('phone').textContent = option.getAttribute('data-phone');
    document.getElementById('age').textContent = option.getAttribute('data-age');
    document.getElementById('condition').textContent = option.getAttribute('data-condition');
    document.getElementById('studentReview').style.display = 'block';
}
</script>
