<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescriptions | MUT E-Doctor Platform</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

    <header>
        <h1>Murang'a University E-Doctor Platform</h1>
        <nav>
            <a href="home.html">Home</a>
            <a href="appointments.html">Appointments</a>
            <a href="consultation.html">Consultation</a>
            <a href="doctors-registration.html">Doctors Registration</a>
            <a href="labs.html">Lab</a>
            <a href="prescriptions.html">Prescription</a>
        </nav>
    </header>

    <main>
        <h2>Patient Prescription</h2>

        <form id="prescriptionForm" action="../../backend-php/api/prescriptions.php" method="POST">

            <label for="patient_name">Patient Name</label>
            <input type="text" id="patient_name" name="patient_name" required>

            <label for="patient_id">Patient ID</label>
            <input type="text" id="patient_id" name="patient_id">

            <label for="doctor">Doctor</label>
            <input type="text" id="doctor" name="doctor" required>

            <label for="medicine">Medicine</label>
            <input type="text" id="medicine" name="medicine" required>

            <label for="dosage">Dosage</label>
            <input type="text" id="dosage" name="dosage" placeholder="e.g. 2 tablets daily">

            <label for="instructions">Instructions</label>
            <textarea id="instructions" name="instructions"></textarea>

            <button type="submit">Save Prescription</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 MURANG'A UNIVERSITY.</p>
    </footer>

</body>

</html>
