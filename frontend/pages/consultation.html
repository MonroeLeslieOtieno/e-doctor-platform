<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Consultation | MUT E-Doctor Platform</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

    <header>
        <h1>Murang'a University E-Doctor Platform</h1>
        <nav>
            <a href="home.html">Home</a>
            <a href="appointments.html">Appointments</a>
            <a href="consultation.html">Consultation</a>
            <a href="doctors-registration.html">Doctors Registration</a>
            <a href="labs.html">Lab</a>
            <a href="prescriptions.html">Prescription</a>
        </nav>
    </header>

    <main>
        <h2>Consultations Management</h2>
        <button onclick="document.getElementById('addFormContainer').style.display='block'"
            style="background-color:var(--primary-color, #007bff);color:white;padding:10px 15px;border:none;border-radius:4px;cursor:pointer;margin-bottom:15px;">+
            Add New Consultation</button>

        <div id="addFormContainer" class="form-container"
            style="display:none; margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; background: #fff;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>New Consultation</h3>
                <button type="button" onclick="document.getElementById('addFormContainer').style.display='none'"
                    style="background:transparent;border:none;font-size:16px;cursor:pointer;">&times;</button>
            </div>
            <form id="consultationForm">

                <label for="patient_name">Select or Type Patient Name</label>
                <input list="names" id="patient_name" name="patient_name" placeholder="Select or type name" required>
                <datalist id="names">
                    <option value="John Mwangi">
                    <option value="Mary Wanjiku">
                    <option value="James Otieno">
                    <option value="Faith Achieng">
                    <option value="David Kamau">
                </datalist>

                <label for="patient_id">Patient ID</label>
                <input type="text" id="patient_id" name="patient_id" required>

                <label for="doctor">Doctor</label>
                <input type="text" id="doctor" name="doctor" required>

                <label for="symptoms">Symptoms</label>
                <textarea id="symptoms" name="symptoms" required></textarea>

                <label for="diagnosis">Diagnosis</label>
                <textarea id="diagnosis" name="diagnosis" required></textarea>

                <label for="notes">Consultation Notes</label>
                <textarea id="notes" name="notes"></textarea>

                <button type="submit">Save Consultation</button>
                <button type="button"
                    onclick="document.getElementById('addFormContainer').style.display='none'">Cancel</button>
            </form>
        </div>

        <!-- Consultations Table -->
        <h3>Existing Consultations</h3>
        <table border="1" style="width:100%; border-collapse: collapse; margin-top: 10px;" id="consultationsTable">
            <thead>
                <tr style="background:#f2f2f2; text-align:left;">
                    <th style="padding:8px;">Date</th>
                    <th style="padding:8px;">Patient Name</th>
                    <th style="padding:8px;">Doctor</th>
                    <th style="padding:8px;">Symptoms</th>
                    <th style="padding:8px;">Diagnosis</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dynamic rows will be added here -->
            </tbody>
        </table>
    </main>

    <script>
        function loadConsultations() {
            fetch("../../backend-php/api/consultation.php")
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('consultationsTable').querySelector('tbody');
                    tbody.innerHTML = '';
                    if (!data || data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="padding:8px; text-align:center;">No consultations found.</td></tr>';
                        return;
                    }
                    data.forEach(item => {
                        const tr = document.createElement('tr');
                        // Use substring for date to keep it simple if created_at exists
                        tr.innerHTML = `
                            <td style="padding:8px;">${item.created_at ? item.created_at.substring(0, 10) : ''}</td>
                            <td style="padding:8px;">${item.patient_name || 'N/A'}</td>
                            <td style="padding:8px;">${item.doctor || 'N/A'}</td>
                            <td style="padding:8px;">${item.symptoms || ''}</td>
                            <td style="padding:8px;">${item.diagnosis || ''}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(err => console.error("Error fetching data:", err));
        }

        document.getElementById('consultationForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const formData = new URLSearchParams(new FormData(this));
            fetch("../../backend-php/api/consultation.php", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert('Consultation saved successfully!');
                        this.reset();
                        document.getElementById('addFormContainer').style.display = 'none';
                        loadConsultations();
                    } else {
                        alert('Error: ' + data.error);
                    }
                })
                .catch(err => {
                    alert('An error occurred.');
                    console.error(err);
                });
        });

        loadConsultations();
    </script>

    <footer>
        <p>&copy; 2026 MURANG'A UNIVERSITY.</p>
    </footer>

</body>

</html>
