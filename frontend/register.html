<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Registration | E-Doctor Platform</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f4f8fb;
}

header {
    background-color: limegreen;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 600px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    color: limegreen;
    margin-bottom: 20px;
}

/* form styling */
.form-group {
    margin-bottom: 15px;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

textarea {
    resize: vertical;
}

button {
    width: 100%;
    background-color: limegreen;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s;
}

button:hover {
    background-color: navy;
}

.success-message {
    margin-top: 15px;
    padding: 10px;
    background-color: #e6ffe6;
    color: green;
    border-radius: 6px;
    display: none;
    text-align: center;
}

footer {
    background-color: limegreen;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 30px;
}

@media(max-width:600px){
    .container {
        margin: 20px;
        padding: 20px;
    }
}
</style>
</head>

<body>

<header>
    <h1>Patient Registration</h1>
    <p>E-Doctor Platform | Murang'a University Health Unit</p>
</header>

<div class="container">

    <h2>Register New Patient</h2>

    <form id="registrationForm">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullname" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select id="gender" required>
                <option value="">-- Select Gender --</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" id="age" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Medical History (Optional)</label>
            <textarea id="history" placeholder="Brief medical history..."></textarea>
        </div>

        <button type="submit">Register Patient</button>

        <div class="success-message" id="successMessage">
            Patient registered successfully!
        </div>

    </form>

</div>

<footer>
    &copy; 2026 Murang'a University Health Unit
</footer>

<script>
document.getElementById("registrationForm").addEventListener("submit", function(event){
    event.preventDefault();

    const fullname = document.getElementById("fullname").value;
    const gender = document.getElementById("gender").value;
    const age = document.getElementById("age").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;

    if(fullname === "" || gender === "" || age === "" || phone === "" || email === "" )
    {
        alert("Please fill in all required fields.");
        return;
    }

    // Show success message (temporary frontend behavior)
    document.getElementById("successMessage").style.display = "block";

    // Clear form
    document.getElementById("registrationForm").reset();
}
</script>

</body>

</html>
